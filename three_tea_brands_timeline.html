
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.5rem 0;font-family:var(--font-sans)}
.legend{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:1.5rem;font-size:12px}
.leg-item{display:flex;align-items:center;gap:6px;color:var(--color-text-secondary)}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.timeline{position:relative;padding-left:0}
.year-group{margin-bottom:0}
.year-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);padding:12px 0 4px;border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px}
.era-tag{font-size:10px;padding:1px 8px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
.events{display:flex;flex-direction:column;gap:5px;padding-bottom:6px}
.event{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:6px;background:var(--color-background-secondary);border-left:3px solid transparent;font-size:12px;line-height:1.5;color:var(--color-text-primary)}
.event.lipton{border-left-color:#BA7517}
.event.chali{border-left-color:#1D9E75}
.event.xgt{border-left-color:#D85A30}
.event.all{border-left-color:#534AB7}
.event-brand{font-size:10px;font-weight:500;padding:1px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:1px}
.brand-lipton{background:#FAEEDA;color:#633806}
.brand-chali{background:#E1F5EE;color:#0F6E56}
.brand-xgt{background:#FAECE7;color:#993C1D}
.brand-all{background:#EEEDFE;color:#534AB7}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fbtn{font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.fbtn.on{border-color:transparent}
.fbtn-all.on{background:#EEEDFE;color:#534AB7}
.fbtn-lipton.on{background:#FAEEDA;color:#633806}
.fbtn-chali.on{background:#E1F5EE;color:#0F6E56}
.fbtn-xgt.on{background:#FAECE7;color:#993C1D}
</style>
<div class="wrap">
<div class="legend">
  <span class="leg-item"><span class="leg-dot" style="background:#BA7517"></span>立顿 Lipton</span>
  <span class="leg-item"><span class="leg-dot" style="background:#1D9E75"></span>茶里 CHALI</span>
  <span class="leg-item"><span class="leg-dot" style="background:#D85A30"></span>小罐茶</span>
  <span class="leg-item"><span class="leg-dot" style="background:#534AB7"></span>行业大事</span>
</div>
<div class="filters">
  <button class="fbtn fbtn-all on" onclick="filter('all',this)">全部</button>
  <button class="fbtn fbtn-lipton" onclick="filter('lipton',this)">立顿</button>
  <button class="fbtn fbtn-chali" onclick="filter('chali',this)">茶里</button>
  <button class="fbtn fbtn-xgt" onclick="filter('xgt',this)">小罐茶</button>
</div>
<div id="tl"></div>
</div>

    {brand:'all', label:'行业', text:'中茶总公司改制，云南、福建等四大省茶公司民营化，中国茶行业商业化进程正式开启，第一代本土茶品牌开始涌现。'},

  {year:'2005', era:'工厂扩张', events:[

    {brand:'chali', label:'茶里', text:'茶里借鉴立顿袋泡茶模式，将其升级——用可降解玉米纤维茶包替代无纺布，用整叶原茶替代碎茶末，开发蜜桃乌龙等年轻化口味，推出首批8个SKU。'},

  {year:'2016', era:'小罐茶上市爆发', events:[

    {brand:'xgt', label:'小罐茶', text:'小罐茶收入缩减至约10亿元，此后不再公布销售数据，开始"平台化"战略转型，推出多泡装、彩罐系列，布局大众市场。'},
    {brand:'all', label:'行业', text:'新式茶饮（喜茶、奈雪等）爆发，现制茶饮与袋泡茶竞争加剧；农夫山泉东方树叶无糖茶开始爆发式增长，行业格局进入多线作战时代。'},

  {year:'2021', era:'立顿被出售', events:[
    {brand:'lipton', label:'立顿', text:'联合利华正式宣布以45亿欧元将全球茶叶业务"ekaterra"（含34个品牌，含立顿）出售给欧洲私募巨头CVC Capital Partners，联合利华彻底告别"全球最大茶企"称号。'},
    {brand:'chali', label:'茶里', text:'茶里2021年618夺天猫、京东茶类目双冠王，全年销售额破亿，业内人士透露国内袋泡茶销量已赶超立顿，成为中国袋泡茶事实第一品牌。'},

    {brand:'xgt', label:'小罐茶', text:'杜国楹坦言"小罐茶成立十年没赚到一分钱"，公司重投15亿建设黄山超级工厂，尝试全产业链工业化；营销端开始反思，逐步收缩大师概念。'},

    {brand:'xgt', label:'小罐茶', text:'三品牌矩阵（小罐茶+年迹+小罐茶园）+泡茶机+无糖茶饮料，形成三轮驱动；全国2000家门店体系重建，推出"敢保真"区块链溯源战略，试图重建消费信任。'},
    {brand:'lipton', label:'立顿', text:'在华探索新零售路径，尝试艺术联名（与UCCA合作）重塑高端形象，但产品仍依赖茶末原料，与"文化升级"叙事存在巨大落差，复苏路漫漫。'},

let active = 'all';

function filter(cat, btn){
  active = cat;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  const tl = document.getElementById('tl');
  tl.innerHTML = data.map(g => {
    const evts = g.events.filter(e => active === 'all' || e.brand === active);
    if(!evts.length) return '';
    return `<div class="year-group">
      <div class="year-label">${g.year} <span class="era-tag">${g.era}</span></div>
      <div class="events">${evts.map(e => `
        <div class="event ${e.brand}">
          <span class="event-brand brand-${e.brand}">${e.label}</span>
          <span>${e.text}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
render();
</script>
